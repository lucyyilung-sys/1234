<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Band Dashboard</title>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: sans-serif; text-align: center; padding: 20px; transition: background-color 0.5s; }
        #clock { font-size: 4rem; color: #38bdf8; font-weight: bold; margin-bottom: 5px; }
        #api-status { padding: 5px 15px; background: #1e293b; border-radius: 20px; font-size: 0.9rem; display: inline-block; margin-bottom: 20px;}
        .grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin: 20px 0 40px 0; }
        .box { background: #1e293b; padding: 30px; border-radius: 20px; width: 250px; border: 1px solid #334155; }
        .val { font-size: 3rem; font-weight: bold; margin: 10px 0; }
        .safe { color: #22c55e; }
        .fall { color: #ef4444; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        iframe { border-radius: 20px; border: 1px solid #334155; }
    </style>
</head>
<body>

    <div id="clock">00:00:00</div>
    <div id="api-status" style="color: yellow;">Waiting for Blynk...</div>

    <div class="grid">
        <div class="box">
            <div style="color: #94a3b8; font-weight: bold; letter-spacing: 1px;">HEART RATE</div>
            <div id="bpm" class="val">--</div>
            <div style="color: #64748b;">BPM</div>
        </div>
        <div class="box">
            <div style="color: #94a3b8; font-weight: bold; letter-spacing: 1px;">SAFETY STATUS</div>
            <div id="status" class="val safe">SAFE</div>
            <div id="status-desc" style="color: #64748b;">Environment Secure</div>
        </div>
    </div>

    <iframe width="100%" height="400" style="max-width: 800px;" src="https://www.openstreetmap.org/export/embed.html?bbox=100.4816,5.1386,100.4996,5.1526&layer=mapnik&marker=5.1456,100.4906"></iframe>

    <script>
        const TOKEN = "10VutsRka_hwFWOoH_Qu7jG-zKsSY5aB";
        const URL = "https://sgp1.blynk.cloud/external/api/get?token=" + TOKEN + "&V0&V2";

        // 1. Clock Logic
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-US', {hour12: false});
        }, 1000);

        // 2. Fetch Data Logic
        async function getData() {
            try {
                let response = await fetch(URL);
                if (!response.ok) throw new Error("Network Bad");
                
                let data = await response.json();
                
                document.getElementById('api-status').innerText = "✅ Connected to Blynk Cloud";
                document.getElementById('api-status').style.color = "#22c55e";

                // Update BPM
                if (data.V0 !== undefined) {
                    document.getElementById('bpm').innerText = data.V0;
                }
 // Update Status (Handling Numbers!)
                if (data.V2 !== undefined) {
                    let statBox = document.getElementById('status');
                    let statDesc = document.getElementById('status-desc');
                    
                    // If V2 equals 1, trigger FALL mode
                    if (data.V2 == 1) { 
                        statBox.innerText = "FALL!!";
                        statBox.className = "val fall";
                        statDesc.innerText = "EMERGENCY DETECTED";
                        document.body.style.backgroundColor = "#450a0a"; // Flash dark red
                    } 
                    // If V2 equals 0, trigger SAFE mode
                    else {
                        statBox.innerText = "SAFE";
                        statBox.className = "val safe";
                        statDesc.innerText = "Environment Secure";
                        document.body.style.backgroundColor = "#020617"; // Back to normal blue/black
                    }
                }
            } catch (error) {
                document.getElementById('api-status').innerText = "❌ Blynk Offline or Token Error";
                document.getElementById('api-status').style.color = "#ef4444";
            }
        }

        // Run data fetch every 2 seconds
        setInterval(getData, 2000);
        getData();
    </script>
</body>
</html>
