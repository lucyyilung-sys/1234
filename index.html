<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Band Dashboard</title>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; transition: background-color 0.5s; }
        #clock { font-size: 3rem; color: #38bdf8; font-weight: bold; margin-bottom: 5px; }
        #api-status { padding: 5px 15px; background: #1e293b; border-radius: 20px; font-size: 0.9rem; display: inline-block; margin-bottom: 20px;}
        .grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin: 20px 0 40px 0; }
        .box { background: #1e293b; padding: 30px; border-radius: 20px; width: 250px; border: 1px solid #334155; }
        .val { font-size: 2.5rem; font-weight: bold; margin: 10px 0; }
        .safe { color: #22c55e; }
        .fall { color: #ef4444; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="clock">00:00:00</div>
    <div id="api-status" style="color: yellow;">Connecting to cloud...</div>

    <div class="grid">
        <div class="box">
            <div style="color: #94a3b8; font-weight: bold;">HEART RATE</div>
            <div id="bpm" class="val">--</div>
            <div style="color: #64748b;">BPM</div>
        </div>
        <div class="box">
            <div style="color: #94a3b8; font-weight: bold;">SAFETY STATUS</div>
            <div id="status" class="val safe">SAFE</div>
            <div id="status-desc" style="color: #64748b;">Environment Secure</div>
        </div>
    </div>

    <script>
        // REPLACE THIS WITH YOUR NEW GENERATED TOKEN
        const TOKEN = "YOUR_NEW_TOKEN_HERE"; 
        const URL = "https://sgp1.blynk.cloud/external/api/get?token=" + TOKEN + "&V0&V2";

        // Clock Update
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-US', {hour12: false});
        }, 1000);

        // Data Fetching
        async function getData() {
            try {
                let response = await fetch(URL);
                if (!response.ok) throw new Error("API Error");
                let data = await response.json();
                
                document.getElementById('api-status').innerText = "✅ Live";
                document.getElementById('api-status').style.color = "#22c55e";

                // Update BPM
                if (data.V0 !== undefined) {
                    document.getElementById('bpm').innerText = Math.round(data.V0);
                }

                // Update Status
                let statBox = document.getElementById('status');
                let statDesc = document.getElementById('status-desc');
                
                if (data.V2 == 1) { 
                    statBox.innerText = "FALL!!";
                    statBox.className = "val fall";
                    statDesc.innerText = "EMERGENCY DETECTED";
                    document.body.style.backgroundColor = "#450a0a";
                } else {
                    statBox.innerText = "SAFE";
                    statBox.className = "val safe";
                    statDesc.innerText = "Environment Secure";
                    document.body.style.backgroundColor = "#020617";
                }
            } catch (error) {
                document.getElementById('api-status').innerText = "❌ Sync Failed";
                document.getElementById('api-status').style.color = "#ef4444";
            }
        }

        setInterval(getData, 2000);
        getData();
    </script>
</body>
</html>
